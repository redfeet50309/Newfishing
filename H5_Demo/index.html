<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SP Fishing RPG - MVP</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-layer">
            <div id="top-bar">
                <div id="player-stats">
                    <span id="gold-display">💰: 0</span>
                    <span id="rod-display">🎣: 新手木竹竿</span>
                </div>
                <!-- Top Buttons moved OUT of player-stats -->
                <div id="top-buttons">
                    <button id="shop-btn">🏪 裝備商店</button>
                    <button id="map-btn">🗺️ 區域切換</button>
                    <button id="bestiary-btn">📖 魚類圖鑑</button>
                </div>
            </div>

            <!-- New Start Fishing Button -->
            <div id="start-fishing-container">
                <button id="start-fishing-btn">開始釣魚 🎣</button>
            </div>

            <div id="state-text" class="hidden"></div>

            <!-- Shop Modal -->
            <div id="shop-modal" class="modal hidden">
                <div class="shop-content">
                    <h2>🏪 裝備商店</h2>
                    <div id="shop-items">
                        <!-- Items generated by JS -->
                    </div>
                    <button id="close-shop-btn" class="close-btn">離開</button>
                </div>
            </div>

            <!-- Map Modal -->
            <div id="map-modal" class="modal hidden">
                <div class="shop-content map-content">
                    <h2>🗺️ 區域切換</h2>
                    <div id="map-items">
                        <!-- Regions/Boats generated by JS -->
                    </div>
                    <button id="close-map-btn" class="close-btn">離開</button>
                </div>
            </div>

            <!-- Bestiary Modal -->
            <div id="bestiary-modal" class="modal hidden">
                <div class="shop-content bestiary-content">
                    <h2>📖 魚類圖鑑</h2>

                    <div class="progress-container">
                        <div class="progress-bar-bg">
                            <div id="bestiary-progress-fill" class="progress-bar-fill"></div>
                        </div>
                        <div id="bestiary-progress-text" class="progress-text">收集進度: 0/30 (0%)</div>
                    </div>

                    <div class="bestiary-scroll-area">
                        <div id="bestiary-stats">
                            <!-- Overrall Buff stats -->
                        </div>
                        <div id="bestiary-grid">
                            <!-- Fish icons generated by JS -->
                        </div>
                    </div>
                    <button id="close-bestiary-btn" class="close-btn">離開</button>
                </div>
            </div>
        </div>

        <!-- Fish Detail Modal -->
        <div id="fish-detail-modal" class="modal hidden" style="z-index: 200;">
            <div class="shop-content fish-detail-content" style="width: 400px; padding: 30px;">
                <div id="fish-detail-img-box"
                    style="width: 150px; height: 150px; margin: 0 auto; border-radius: 10px; background-color: #000; display: flex; justify-content: center; align-items: center;">
                    <img id="fish-detail-img" src="" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h2 id="fish-detail-name" style="margin-top: 15px; color: #fff;">Fish Name</h2>
                <p id="fish-detail-desc" style="color: #adb5bd; margin: 15px 0;">Description</p>
                <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 5px;">
                    <p style="color: #00ffcc; margin-bottom: 5px;">🐟 稀有度: <span id="fish-detail-rarity"></span></p>
                    <p style="color: #fca311; margin-bottom: 5px;">💰 基礎售價: <span id="fish-detail-price"></span> 金幣</p>
                    <p style="color: #a8d8ea; margin-bottom: 5px;">📊 總捕獲數: <span id="fish-detail-count"></span></p>
                    <p style="color: #e94560;">🏆 最大重量紀錄: <span id="fish-detail-weight"></span> kg</p>
                </div>
                <button id="close-detail-btn" class="close-btn" style="width: 100%; margin-top: 20px;">返回圖鑑</button>
            </div>
        </div>
    </div>

    <!-- Game Scripts -->
    <script src="js/game/FishData.js"></script>
    <script src="js/game/FishingSystem.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
